<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>7 TO 7</title>
    <link rel="stylesheet" href="index.css" />
    <link rel="stylesheet" href="navs.css" />
    <script src="index.js" defer></script>
  </head>
  <body>
    <div class="header">
      <img class="logo" src="icons/logo1.png" alt="7 TO 7 Logo" />
      <nav class="navigations-header">
        <a href="#" class="nav-link">Home</a>
        <a href="#" class="nav-link">Shop</a>
        <a href="#" class="nav-link">About Us</a>
        <a href="#" class="nav-link">Contact</a>
      </nav>
      <div class="search-container">
        <input class="search-bar" type="text" placeholder="Search products" />
        <button class="search-button">
          <img
            class="search-icon icon-search"
            src="icons/search-icon.png"
            alt="Search Icon"
          />
        </button>
      </div>
      <div class="cart-container">
        <img
          class="cart-icon icon-cart"
          src="icons/cart-icon.png"
          alt="Cart Icon"
        />
        <span class="cart-count">0</span>
      </div>
    </div>
    <!-- container used by script to swap content -->
    <div id="content">
      <div class="search-results"></div>
      <section class="section1">
        <div class="democlothes" id="section1-products"></div>
      </section>
      <section class="section2">
        <div class="democlothes" id="section2-products"></div>
        <span class="section2-text"
          >Explore our latest collection of trendy and stylish clothing for the
          fashion-forward. From casual wear to statement pieces, our collection
          has something for everyone. Shop now and elevate your wardrobe with
          our must-have styles.</span
        >
        >
      </section>
    </div>
    <!-- end #content -->
    <!-- Cart Tab -->
    <div class="cart-tab">
      <h1 class="cart-head">Shopping Cart</h1>
      <div class="cart-items"></div>
      <div class="cart-buttons">
        <button class="close-btn close">CLOSE</button>
        <button class="checkout-btn checkout">CHECKOUT</button>
      </div>
    </div>
  </body>
</html>
